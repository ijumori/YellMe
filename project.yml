name: YellMe
options:
  bundleIdPrefix: com.takahiro
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: 5.9
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 2

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

targets:
  YellMe:
    type: application
    platform: iOS
    bundleId: com.takahiro.yellme
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        excludes:
          # テンプレはビルドに含めない（Secrets.swift と二重定義になるため）
          - "**/Secrets.swift.example"
          # エージェント用ドキュメント（複数あると CpResource で同名衝突する）
          - "**/*.md"
    resources:
      - path: Resources/GoogleService-Info.plist
        optional: true
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
    entitlements:
      path: YellMe.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_NAME: YellMe
        PRODUCT_BUNDLE_IDENTIFIER: com.takahiro.yellme
        INFOPLIST_FILE: Sources/Info.plist
        DEVELOPMENT_TEAM: NXFZ5AUX62
        CODE_SIGN_ENTITLEMENTS: YellMe.entitlements
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: エールミー
        CFBundleName: YellMe
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "2"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: AccentColor
        CFBundleIconName: AppIcon
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: プロフィール画像の設定に使用します
        NSPhotoLibraryUsageDescription: プロフィール画像の設定に使用します
        YELLME_PREMIUM_PRODUCT_ID: com.takahiro.yellme.premium.monthly

  YellMeTests:
    type: bundle.unit-test
    platform: iOS
    bundleId: com.takahiro.yellme.tests
    sources:
      - path: Tests
        optional: true
    dependencies:
      - target: YellMe
